<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — blng studio</title>
<style>
  :root {
    --charcoal:   #1C1C1A;
    --porcelain:  #F8F6F3;
    --terracotta: #D98E6A;
    --mustard:    #FFC850;
    --green:      #7A973F;
    --page-bg:    #F8F6F3;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }
  html { scroll-behavior: smooth; }
  body { background: var(--page-bg); color: var(--charcoal); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; }

  /* ─── CURSOR ─── */
  #cursor      { position: fixed; width: 10px; height: 10px; background: var(--terracotta); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: transform 0.15s ease; opacity: 0; }
  #cursor-ring { position: fixed; width: 38px; height: 38px; border: 1px solid var(--charcoal); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); opacity: 0; transition: opacity 0.2s; }

  /* ─── NAV ─── */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 12px 48px 12px 80px; display: flex; justify-content: space-between; align-items: center; background: var(--page-bg); border-bottom: 2px solid rgba(28,28,26,0.07); }
  #nav-logo { display: block; text-decoration: none; opacity: 0.9; transition: opacity 0.25s; flex-shrink: 0; }
  #nav-logo:hover { opacity: 1; }
  #nav-logo img { width: 573px; display: block; }
  .nav-links { display: flex; gap: 44px; list-style: none; }
  .nav-links a { font-size: 1.4rem; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; color: var(--charcoal); transition: color 0.25s; }
  .nav-links a:hover { color: var(--terracotta); }
  .nav-links a.active { color: var(--green); }

  /* ─── PROJECT INTRO ─── */
  .project-intro { padding: 200px 48px 64px; }
  .project-back { font-size: 1.0rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--charcoal); text-decoration: none; display: inline-flex; align-items: center; gap: 10px; margin-bottom: 72px; opacity: 0.45; transition: opacity 0.2s; }
  .project-back:hover { opacity: 1; }
  .project-intro-grid { display: grid; grid-template-columns: 1fr auto; gap: 80px; align-items: end; }
  .project-title { font-size: clamp(2.6rem, 5vw, 4.8rem); font-weight: 300; line-height: 1.05; letter-spacing: -0.02em; color: var(--charcoal); }
  .project-meta-block { display: flex; flex-direction: column; gap: 14px; padding-bottom: 6px; min-width: 220px; }
  .project-meta-row { display: grid; grid-template-columns: 110px 1fr; gap: 12px; align-items: baseline; }
  .project-meta-label { font-size: 1.0rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--charcoal); opacity: 0.45; }
  .project-meta-value { font-size: 1.5rem; font-weight: 300; color: var(--charcoal); }

  /* ─── HERO ─── */
  .project-hero { padding: 0 48px; margin-bottom: 2px; }
  .hero-img { width: 100%; aspect-ratio: 16 / 7; display: block; }

  /* ─── OVERVIEW ─── */
  .project-overview { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; padding: 72px 48px 80px; border-bottom: 2px solid rgba(28,28,26,0.1); }
  .project-description p { font-size: 1.75rem; line-height: 1.85; color: var(--charcoal); margin-bottom: 20px; }
  .project-description p:last-child { margin-bottom: 0; }
  .project-specs { padding-top: 4px; }
  .spec-row { display: grid; grid-template-columns: 160px 1fr; gap: 16px; padding: 16px 0; border-bottom: 2px solid rgba(28,28,26,0.08); }
  .spec-row:first-child { border-top: 2px solid rgba(28,28,26,0.08); }
  .spec-label { font-size: 1.0rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--charcoal); opacity: 0.45; padding-top: 2px; }
  .spec-value { font-size: 1.5rem; line-height: 1.55; color: var(--charcoal); font-weight: 300; }

  /* ─── DESC MORE BUTTON ─── */
  .desc-more-btn { display: inline-flex; align-items: center; gap: 8px; font-family: 'DM Sans', sans-serif; font-size: 1.1rem; letter-spacing: 0.14em; text-transform: uppercase; padding: 10px 22px; border-radius: 999px; border: 2px solid rgba(28,28,26,0.35); background: transparent; color: var(--charcoal); transition: border-color 0.2s, color 0.2s; margin-top: 16px; }
  .desc-more-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }

  /* ─── GALLERY ─── */
  .project-gallery { padding: 0 48px; }
  .g-masonry { columns: 2; column-gap: 18px; }
  .g-item { break-inside: avoid; margin-bottom: 18px; display: block; }
  .g-item img { width: 100%; height: auto; display: block; }
  .g-img { display: block; width: 100%; }
  .g-img.r-cinema  { aspect-ratio: 21 / 9; }
  .g-caption { font-size: 0.55rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--charcoal); opacity: 0.38; padding: 9px 0 40px; }

  /* ─── NEXT PROJECT ─── */
  .project-next-wrap { padding: 72px 48px; border-top: 2px solid rgba(28,28,26,0.1); margin-top: 72px; }
  .project-next-label { font-size: 1.0rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--charcoal); opacity: 0.4; margin-bottom: 16px; }
  .project-next-link { text-decoration: none; display: flex; justify-content: space-between; align-items: center; }
  .project-next-title { font-size: clamp(2.0rem, 3.5vw, 3.2rem); font-weight: 300; color: var(--charcoal); transition: color 0.25s; letter-spacing: -0.01em; }
  .project-next-arrow { font-size: 2.8rem; color: var(--charcoal); opacity: 0.25; transition: color 0.25s, opacity 0.2s, transform 0.25s; }
  .project-next-link:hover .project-next-title { color: var(--terracotta); }
  .project-next-link:hover .project-next-arrow { color: var(--terracotta); opacity: 1; transform: translateX(10px); }

  /* ─── FOOTER ─── */
  footer { border-top: 2px solid rgba(28,28,26,0.1); padding: 56px 60px; display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: start; margin-top: auto; }
  .footer-address { font-size: 1.2rem; line-height: 1.9; color: var(--charcoal); letter-spacing: 0.04em; }
  .footer-middle  { text-align: center; font-size: 1.2rem; line-height: 2; letter-spacing: 0.04em; color: var(--charcoal); }
  .footer-right   { text-align: right; font-size: 1.2rem; line-height: 1.9; letter-spacing: 0.04em; color: var(--charcoal); }
  footer a { color: var(--charcoal); text-decoration: underline; text-underline-offset: 3px; transition: color 0.2s; }
  footer a:hover { color: var(--terracotta); }

  /* ─── SCROLL REVEAL ─── */
  .reveal { opacity: 1; transform: translateY(0); transition: opacity 0.65s ease, transform 0.65s ease; }
  .js-loaded .reveal { opacity: 0; transform: translateY(16px); }
  .js-loaded .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 1024px) {
    #nav-logo img { width: 401px; }
  }
  @media (max-width: 768px) {
    .desc-more-btn { font-size: 0.9rem; padding: 8px 16px; }
    #nav-logo img { width: 298px; }
    nav { padding: 10px 20px 10px 24px; }
    .nav-links { gap: 24px; }
    .nav-links a { font-size: 1.2rem; }
    .project-intro { padding: 120px 24px 40px; }
    .project-intro-grid { grid-template-columns: 1fr; gap: 28px; }
    .project-hero { padding: 0 24px; }
    .project-gallery { padding: 0 24px; }
    .project-overview { grid-template-columns: 1fr; gap: 40px; padding: 48px 24px 56px; }
    .project-description p { font-size: 1.5rem; }
    .spec-row { grid-template-columns: 1fr; gap: 4px; }
    .spec-label { padding-bottom: 2px; }
    .project-next-wrap { padding: 48px 24px; }
    footer { grid-template-columns: 1fr; gap: 20px; padding: 40px 24px; }
    .footer-middle { text-align: left; }
    .footer-right { text-align: left; }
  }
  @media (max-width: 480px) {
    #nav-logo img { width: 220px; }
    nav { padding: 8px 14px 8px 16px; }
    .nav-links { gap: 12px; }
    .nav-links a { font-size: 1.0rem; letter-spacing: 0; }
    .project-intro { padding: 96px 16px 32px; }
    .project-hero { padding: 0 16px; }
    .project-gallery { padding: 0 16px; }
    .project-overview { padding: 40px 16px 48px; }
    .project-next-wrap { padding: 40px 16px; }
    footer { padding: 32px 16px; }
    .g-masonry { columns: 1; }
    .spec-row { grid-template-columns: 1fr; }
  }
</style>

<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- ─── NAV ─── -->
<nav>
  <a href="index.html" id="nav-logo" aria-label="blng studio home"><img src="brand_assets/blng-studio.png" alt="blng studio"></a>
  <ul class="nav-links">
    <li><a href="work.html">Work</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<!-- ─── PROJECT INTRO ─── -->
<section class="project-intro reveal" id="project-intro">
  <a href="work.html" class="project-back">← All work</a>
  <div class="project-intro-grid">
    <h1 class="project-title" id="project-title">Loading…</h1>
    <div class="project-meta-block" id="project-meta"></div>
  </div>
</section>

<!-- ─── HERO ─── -->
<div class="project-hero" id="project-hero">
  <div class="g-img r-cinema" id="hero-placeholder" style="background:linear-gradient(145deg,#c8c0b2,#a09080);"></div>
</div>

<!-- ─── OVERVIEW ─── -->
<div class="project-overview reveal" id="project-overview">
  <div class="project-description" id="project-description"></div>
  <div class="project-specs"       id="project-specs"></div>
</div>

<!-- ─── GALLERY ─── -->
<div class="project-gallery" id="project-gallery"></div>

<div class="project-next-wrap reveal" id="project-next" style="display:none">

<script>
(function() {
  'use strict';

  // Mark JS as loaded — enables scroll reveal hiding; without this, all content is visible by default
  document.body.classList.add('js-loaded');

  var CLOUD = 'dgelbnw1g';
  var MAX_GALLERY_PROBE = 30;

  // ── Footer random color ──────────────────────────────────────
  document.querySelector('footer').style.background =
    ['#FFD67C','#B8CE88','#D98E6A'][Math.floor(Math.random() * 3)];

  // ── Cursor (pointer devices only) ────────────────────────────
  if (!window.matchMedia('(hover: none)').matches) {
    var cursor = document.getElementById('cursor');
    var ring   = document.getElementById('cursor-ring');
    var mx=0, my=0, rx=0, ry=0;
    document.addEventListener('mousemove', function(e) {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx+'px'; cursor.style.top = my+'px';
      cursor.style.opacity = '1'; ring.style.opacity = '0.4';
    });
    document.addEventListener('mouseleave', function() {
      cursor.style.opacity='0'; ring.style.opacity='0';
    });
    (function lerp(){
      rx+=(mx-rx)*0.10; ry+=(my-ry)*0.10;
      ring.style.left=rx+'px'; ring.style.top=ry+'px';
      requestAnimationFrame(lerp);
    })();
    document.querySelectorAll('a, button').forEach(function(el){
      el.addEventListener('mouseenter', function(){
        cursor.style.transform='translate(-50%,-50%) scale(2.2)';
        ring.style.transform='translate(-50%,-50%) scale(1.3)';
        ring.style.opacity='0.75';
      });
      el.addEventListener('mouseleave', function(){
        cursor.style.transform='translate(-50%,-50%) scale(1)';
        ring.style.transform='translate(-50%,-50%) scale(1)';
        ring.style.opacity='0.4';
      });
    });
  }

  // ── Scroll reveal ────────────────────────────────────────────
  function initReveal(){
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){ e.target.classList.add('visible'); io.unobserve(e.target); }
      });
    }, { threshold:0.06, rootMargin:'0px 0px -40px 0px' });
    document.querySelectorAll('.reveal').forEach(function(el){ io.observe(el); });
  }

  // ── Helpers ──────────────────────────────────────────────────
  function esc(s){
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function metaRow(label, val){
    if(!val) return '';
    return '<div class="project-meta-row"><span class="project-meta-label">'+esc(label)+'</span>'+
           '<span class="project-meta-value">'+esc(val)+'</span></div>';
  }
  function specRow(label, val){
    if(!val) return '';
    return '<div class="spec-row"><span class="spec-label">'+esc(label)+'</span>'+
           '<span class="spec-value">'+esc(val)+'</span></div>';
  }
  function cdnUrl(publicId, transforms){
    return 'https://res.cloudinary.com/'+CLOUD+'/image/upload/'+(transforms||'f_auto,q_auto')+'/'+publicId;
  }
  function pad2(n){ return n < 10 ? '0'+n : String(n); }

  // ── Gallery builder ──────────────────────────────────────────
  // Probes images 02…MAX in parallel; shows those that load, in order.
  // Layout pattern (per cycle of 8): 2-up, full, 2-up, 3-up
  function buildGallery(folder, galleryEl){
    var probes = [];
    for(var n=2; n<=MAX_GALLERY_PROBE; n++){
      (function(num){
        var url = cdnUrl(folder+'-'+pad2(num), 'f_auto,q_auto,w_2400');
        probes.push(new Promise(function(resolve){
          var img = new Image();
          img.onload  = function(){ resolve({ n:num, url:url, w:img.naturalWidth, h:img.naturalHeight }); };
          img.onerror = function(){ resolve(null); };
          img.src = url;
        }));
      })(n);
    }

    Promise.all(probes).then(function(results){
      var imgs = results.filter(Boolean).sort(function(a,b){ return a.n - b.n; });
      if(imgs.length === 0) return;

      var masonry = document.createElement('div');
      masonry.className = 'g-masonry';
      imgs.forEach(function(imgData){
        var item = document.createElement('div');
        item.className = 'g-item reveal';
        var imgEl = document.createElement('img');
        imgEl.src = imgData.url;
        imgEl.className = 'g-img';
        imgEl.alt = '';
        item.appendChild(imgEl);
        masonry.appendChild(item);
      });
      galleryEl.appendChild(masonry);
      initReveal();
    });
  }

  // ── Main: load project from JSON ─────────────────────────────
  var slug = new URLSearchParams(window.location.search).get('project') || '';

  fetch('projects.json')
    .then(function(r){ return r.json(); })
    .then(function(projects){
      var idx = projects.findIndex ? projects.findIndex(function(p){ return p.slug===slug; })
                                   : (function(){ for(var i=0;i<projects.length;i++) if(projects[i].slug===slug) return i; return -1; })();
      if(idx === -1){
        document.getElementById('project-title').textContent = 'Project not found';
        return;
      }
      var p = projects[idx];

      // Page title
      document.title = esc(p.title) + ' — blng studio';

      // Intro
      document.getElementById('project-title').textContent = p.title;
      document.getElementById('project-meta').innerHTML =
        metaRow('Type',     p.type.join(', '))  +
        metaRow('Year',     p.year)              +
        metaRow('Location', p.location)          +
        metaRow('Status',   p.status);

      // Hero image (replace placeholder with <img> once loaded)
      var heroEl = document.getElementById('project-hero');
      var ph     = document.getElementById('hero-placeholder');
      var heroUrl = cdnUrl(p.folder+'-01', 'f_auto,q_auto,w_2400');
      var heroImg = new Image();
      heroImg.onload = function(){
        var imgEl = document.createElement('img');
        imgEl.src = heroUrl; imgEl.alt = p.title;
        imgEl.className = 'g-img';
        heroEl.replaceChild(imgEl, ph);
      };
      heroImg.src = heroUrl;

      // Description
      var descEl = document.getElementById('project-description');
      if(p.description){
        p.description.split('\n').forEach(function(para){
          para = para.trim();
          if(para){ var el=document.createElement('p'); el.textContent=para; descEl.appendChild(el); }
        });
        // On mobile, truncate to first sentence with a MORE/LESS toggle
        if(window.innerWidth <= 768){
          var allParas = descEl.querySelectorAll('p');
          var firstText = allParas[0] ? allParas[0].textContent : '';
          var sentEnd = firstText.search(/[.!?](\s|$)/);
          var hasTruncation = sentEnd !== -1 && (sentEnd < firstText.length - 2 || allParas.length > 1);
          if(hasTruncation){
            var shownText = firstText.slice(0, sentEnd + 1);
            var restOfFirst = firstText.slice(sentEnd + 1).trim();
            allParas[0].textContent = shownText;
            var hiddenEl = document.createElement('span');
            hiddenEl.style.display = 'none';
            if(restOfFirst){ var rp = document.createElement('p'); rp.textContent = restOfFirst; hiddenEl.appendChild(rp); }
            for(var pi=1; pi<allParas.length; pi++){ hiddenEl.appendChild(allParas[pi].cloneNode(true)); allParas[pi].remove(); }
            descEl.appendChild(hiddenEl);
            var moreBtn = document.createElement('button');
            moreBtn.className = 'desc-more-btn';
            moreBtn.innerHTML = 'More <span class="desc-arrow">↓</span>';
            var expanded = false;
            moreBtn.addEventListener('click', function(){
              expanded = !expanded;
              hiddenEl.style.display = expanded ? '' : 'none';
              moreBtn.innerHTML = expanded ? 'Less <span class="desc-arrow">↑</span>' : 'More <span class="desc-arrow">↓</span>';
            });
            descEl.appendChild(moreBtn);
          }
        }
      } else {
        descEl.style.display = 'none';
      }

      // Specs
      document.getElementById('project-specs').innerHTML =
        specRow('Client',        p.client)        +
        specRow('Programme',     p.programme)      +
        specRow('Area',          p.area)           +
        specRow('Scope',         p.scope)          +
        specRow('Collaborators', p.collaborators);

      // Gallery
      buildGallery(p.folder, document.getElementById('project-gallery'));

      // Next project
      var nextIdx = (idx + 1) % projects.length;
      var next = projects[nextIdx];
      var nextWrap = document.getElementById('project-next');
      var nextLink = document.getElementById('project-next-link');
      document.getElementById('project-next-title').textContent = next.title;
      nextLink.href = 'project.html?project=' + encodeURIComponent(next.slug);
      nextWrap.style.display = '';

      // Reveal init (for already-in-view sections)
      initReveal();
    })
    .catch(function(err){
      document.getElementById('project-title').textContent = 'Unable to load project.';
    });

})();
</script>
