<!DOCTYPE html>

<meta charset="UTF-8">

<title>blng studio — Architecture + Design</title>
<style>
  :root {
    --charcoal:   #1C1C1A;
    --porcelain:  #F8F6F3;
    --terracotta: #D98E6A;
    --mustard:    #FFC850;
    --green:      #7A973F;
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; overflow-x:hidden; background:var(--porcelain); font-family:'DM Sans',sans-serif; }
  body { cursor:none; min-height:8000vh; }

  #cursor { position:fixed; width:10px; height:10px; background:var(--terracotta); border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); transition:transform 0.15s ease; }
  #cursor-ring { position:fixed; width:38px; height:38px; border:1px solid var(--charcoal); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); opacity:0.4; }

  nav { position:fixed; top:0; left:0; right:0; z-index:100; padding:36px 48px; display:flex; justify-content:flex-end; align-items:center; pointer-events:none; opacity:0; transition:opacity 0.8s ease; }
  nav.visible { pointer-events:all; opacity:1; }
  .nav-logo { font-size:0.7rem; letter-spacing:0.18em; text-transform:uppercase; text-decoration:none; color:var(--charcoal); opacity:0.4; }
  .nav-links { display:flex; gap:44px; list-style:none; }
  .nav-links a { font-size:1.4rem; letter-spacing:0.12em; text-transform:uppercase; text-decoration:none; color:var(--charcoal); transition:color 0.25s; }
  .nav-links a:hover { color:var(--terracotta); }

  #drift-layer { position:fixed; inset:0; z-index:1; opacity:0; transition:opacity 2s ease; overflow:hidden; }
  #drift-layer.visible { opacity:1; }
  #drift-layer::after { content:''; position:absolute; inset:0; z-index:2; pointer-events:none; background:radial-gradient(ellipse at center, rgba(248,246,243,0.05) 0%, rgba(248,246,243,0.55) 100%); }
  .drift-wrapper { position:absolute; overflow:hidden; box-shadow:0 12px 60px rgba(28,28,26,0.13); cursor:none; }
  .drift-wrapper .placeholder, .drift-wrapper img { width:100%; height:100%; object-fit:cover; display:block; filter:contrast(1.02) saturate(0.82); }
  .drift-label { position:absolute; bottom:0; left:0; right:0; z-index:3; padding:14px 18px; background:linear-gradient(to top,rgba(28,28,26,0.72),transparent); font-size:0.58rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--porcelain); opacity:0; transition:opacity 0.3s; }
  .drift-wrapper:hover .drift-label { opacity:1; }

  /* LOGO */
  #logo-stage { position:fixed; inset:0; z-index:10; display:flex; align-items:center; justify-content:center; pointer-events:none; }
  #logo-wrap { position:relative; }

  #tagline { position:fixed; bottom:44px; left:0; right:0; text-align:center; z-index:10; opacity:0; transform:translateY(10px); transition:opacity 0.9s ease, transform 0.9s ease; pointer-events:none; }
  #tagline.visible { opacity:1; transform:translateY(0); }
  #tagline p { font-size:1.1rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--charcoal); }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 1024px) {
    nav { padding:28px 32px; }
    .nav-links { gap:32px; }
  }
  @media (max-width: 768px) {
    nav { padding:22px 24px; }
    .nav-links { gap:24px; }
    .nav-links a { font-size:1.2rem; }
    #tagline { bottom:28px; }
    #tagline p { font-size:0.95rem; letter-spacing:0.15em; }
  }
  @media (max-width: 480px) {
    nav { padding:18px 16px; }
    .nav-links { gap:16px; }
    .nav-links a { font-size:1.0rem; }
    #tagline p { font-size:0.85rem; letter-spacing:0.1em; }
  }
</style>

         fill="#1c1c1a"
         fill-opacity="1"
         id="path42" />
    </g>
  </g>
</svg>
  </div>
</div>

<div id="tagline"><p>Architecture &amp; Design &nbsp;&middot;&nbsp; London &nbsp;&middot;&nbsp; 1955</p></div>

<script>
'use strict';

// ── DRIFT CONTROLS ────────────────────────────────────────────
const DRIFT_SPEED_MIN = 40;    // px/s upward
const DRIFT_SPEED_MAX = 80;    // px/s upward

// CURSOR
const cursor = document.getElementById('cursor');
const ring   = document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{ mx=e.clientX; my=e.clientY; cursor.style.left=mx+'px'; cursor.style.top=my+'px'; });
(function lr(){ rx+=(mx-rx)*.10; ry+=(my-ry)*.10; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(lr); })();
document.querySelectorAll('a').forEach(a=>{
  a.addEventListener('mouseenter',()=>{ cursor.style.transform='translate(-50%,-50%) scale(2.2)'; ring.style.opacity='.75'; ring.style.transform='translate(-50%,-50%) scale(1.3)'; });
  a.addEventListener('mouseleave',()=>{ cursor.style.transform='translate(-50%,-50%) scale(1)'; ring.style.opacity='.4'; ring.style.transform='translate(-50%,-50%) scale(1)'; });
});

function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

// Ease in-out quad
function easeInOut(t){ return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

// Animate multiple SVG group transforms in SVG user units
function animateSlide(moves, durationMs){
  return new Promise(resolve => {
    const start = performance.now();
    (function tick(now){
      const t = easeInOut(Math.min((now - start) / durationMs, 1));
      moves.forEach(([el, dx]) => {
        if(el) el.setAttribute('transform', `translate(${dx * t}, 0)`);
      });
      if(t < 1) requestAnimationFrame(tick);
      else resolve();
    })(performance.now());
  });
}

async function runAnimation(){
  await loadFeaturedPool();
  const svg   = document.getElementById('svg-bieling');
  const svgB  = document.getElementById('svg-blng');
  const wrap  = document.getElementById('logo-wrap');

  // Hide the blng SVG — not used in this animation
  svgB.style.display = 'none';

  // ── Crop SVG to the letter band ───────────────────────────────
  // bieling letters span x: 477–1207, y: 1025–1370 (incl. g descender)
  // ViewBox frames bieling with small margins
  const VB = { x: 430, y: 1020, w: 820, h: 355 };
  svg.setAttribute('viewBox', `${VB.x} ${VB.y} ${VB.w} ${VB.h}`);

  const logoW = Math.min(window.innerWidth * 0.82, 680);
  const logoH = Math.round(logoW * VB.h / VB.w);

  wrap.style.cssText = `width:${logoW}px; height:${logoH}px; position:relative; overflow:visible; flex-shrink:0;`;
  svg.style.cssText  = `width:${logoW}px; height:${logoH}px; display:block; opacity:0;`;

  // Grab letter groups (defined in the inline bieling.svg)
  const g = id => svg.querySelector(`g[id="${id}"]`);
  const lB = g('letter-b'), lI = g('letter-i'), lE = g('letter-e'),
        lL = g('letter-l'), lI2= g('letter-i2'),lN = g('letter-n'), lG = g('letter-g');

  // Hide all letters before fade-in
  [lB,lI,lE,lL,lI2,lN,lG].forEach(el => { if(el) el.style.opacity = '0'; });

  // ── STEP 1: "bieling" fades in ────────────────────────────────
  await wait(300);
  svg.style.transition = 'opacity 0.7s ease';
  svg.style.opacity = '1';
  [lB,lI,lE,lL,lI2,lN,lG].forEach(el => {
    if(el){ el.style.transition = 'opacity 0.5s ease'; el.style.opacity = '1'; }
  });
  await wait(1400); // hold so viewer can read

  // ── STEP 2: i, e, i fade out — gaps appear ────────────────────
  [lI, lE, lI2].forEach(el => {
    if(el){ el.style.transition = 'opacity 0.55s ease'; el.style.opacity = '0'; }
  });
  await wait(750);

  // ── STEP 3: b, l, n, g close the gaps ────────────────────────
  // All deltas in SVG user units (bieling.svg coordinate space).
  // b stays fixed. l, n, g slide left to sit right after b with ~18u gaps.
  //   b right edge ≈ 615  →  l target left = 633  (was 823.55)  Δ = –190.55
  //   l new right  ≈ 661  →  n target left = 679  (was 919.93)  Δ = –240.93
  //   n new right  ≈ 809  →  g target left = 827  (was 1069)    Δ = –242
  await animateSlide([
    [lL, -190.55],
    [lN, -240.93],
    [lG, -242],
  ], 750);

  await wait(300);

  // ── STEP 4: Expand to "blng studio" ──────────────────────────
  // ViewBox width 1369 covers full "blng studio" in blng.svg (x: 151→1520).
  // bieling vb_x stays at 430; blng vb_x = 430 − 278.84 = 151 so b aligns.
  // Both SVGs use the same vbW → same scale → letter height unchanged.
  const VBW2 = 1369;
  const logoW2 = Math.min(Math.round(window.innerWidth * 0.82), 1140);

  // Widen bieling SVG viewBox (letters stay put, space opens to the right)
  svg.setAttribute('viewBox', `430 1020 ${VBW2} 355`);
  svg.style.width = logoW2 + 'px';

  // Prepare svg-blng: aligned viewBox, blng letters shown, studio letters hidden
  svgB.setAttribute('viewBox', `151 1020 ${VBW2} 355`);
  svgB.style.cssText = `width:${logoW2}px; height:${logoH}px; display:block; position:absolute; top:0; left:0; opacity:0;`;

  const sG = id => svgB.querySelector(`g[id="${id}"]`);
  ['letter-b','letter-l','letter-n','letter-g'].forEach(id => {
    const el = sG(id); if(el) el.style.opacity = '1';
  });
  ['letter-s','letter-t','letter-u','letter-d','letter-i','letter-o'].forEach(id => {
    const el = sG(id); if(el) el.style.opacity = '0';
  });

  // Expand wrap width, cross-fade bieling → blng
  wrap.style.transition = 'width 0.5s ease';
  wrap.style.width = logoW2 + 'px';
  svgB.style.transition = 'opacity 0.35s ease';
  svgB.style.opacity = '1';
  svg.style.transition  = 'opacity 0.35s ease';
  svg.style.opacity = '0';
  await wait(600);

  // ── STEP 5: "studio" types out letter by letter ───────────────
  for(const id of ['letter-s','letter-t','letter-u','letter-d','letter-i','letter-o']){
    const el = sG(id);
    if(el){ el.style.transition = 'opacity 0.12s ease'; el.style.opacity = '1'; }
    await wait(110);
  }
  await wait(400);

  // ── Show UI + start drift ─────────────────────────────────────
  buildDrift();
  await wait(400);
  document.getElementById('drift-layer').classList.add('visible');
  document.getElementById('nav').classList.add('visible');
  document.getElementById('tagline').classList.add('visible');
  await wait(400);
  startDrift();
}

// ── PROJECT IMAGE POOL ────────────────────────────────────────
// Loaded dynamically from projects.json (featured:true entries).
// Falls back to placeholder gradients if JSON unavailable or no featured projects.
const CLOUD = 'dgelbnw1g';
const POOL_FALLBACK = [
  { name:'District Administration — Hybrid Timber', img:null, colour:'linear-gradient(160deg,#c9c0b2,#a09080)', w:1600, h:2100 },
  { name:'Seminary Chapel',                         img:null, colour:'linear-gradient(160deg,#b8c8b2,#8a9a72)', w:1600, h:1067 },
  { name:'Sophienschule Campus',                    img:null, colour:'linear-gradient(160deg,#cec8b8,#a89862)', w:1600, h:2000 },
  { name:'Fuhle 101 Mixed-Use',                     img:null, colour:'linear-gradient(160deg,#cac6ba,#9c9682)', w:1600, h:2133 },
  { name:'WIKUS Headquarters',                      img:null, colour:'linear-gradient(160deg,#c2baca,#928aa2)', w:1600, h:900  },
  { name:'Bellevue Apartments',                     img:null, colour:'linear-gradient(160deg,#bacabe,#8a9a8e)', w:1600, h:2000 },
];
let POOL = POOL_FALLBACK.slice();

async function loadFeaturedPool() {
  try {
    const resp = await fetch('projects.json');
    if (!resp.ok) return;
    const projects = await resp.json();
    const featured = projects.filter(p => p.featured);
    if (featured.length < 2) return; // need at least 2 for 2-column layout
    POOL = featured.map(p => ({
      name:   p.title,
      img:    `https://res.cloudinary.com/${CLOUD}/image/upload/f_auto,q_auto,w_1400/${p.folder}-01`,
      colour: null,
      slug:   p.slug,
      w: 1600,
      h: 2000,  // default portrait ratio — image fills via object-fit:cover
    }));
  } catch(e) { /* keep fallback */ }
}

// ── TWO WIDE COLUMNS ──────────────────────────────────────────
const COLS = [
  { xFrac: 0.03, wFrac: 0.44 },  // left half
  { xFrac: 0.53, wFrac: 0.44 },  // right half
];
const colPoolIdx = [0, 3];
const MAX_CARDS = 8;

function spawnCard(colIdx, startY){
  const layer = document.getElementById('drift-layer');
  if(layer.querySelectorAll('.drift-wrapper').length >= MAX_CARDS) return;
  const vw    = window.innerWidth;
  const col   = COLS[colIdx];
  const proj  = POOL[colPoolIdx[colIdx] % POOL.length];
  colPoolIdx[colIdx]++;

  // Width: natural image width, capped at column width
  const colW  = Math.floor(vw * col.wFrac);
  const cardW = Math.min(proj.w, colW);
  const cardH = Math.round(proj.h * cardW / proj.w);
  // slight random jitter within the column zone for organic feel
  const jitter = Math.floor((Math.random() - 0.5) * vw * 0.04);
  const cardX = Math.max(0, Math.min(Math.floor(vw * col.xFrac) + jitter, vw - cardW - 8));

  const card = document.createElement('div');
  card.className = 'drift-wrapper';
  card.style.cssText = `width:${cardW}px;height:${cardH}px;left:${cardX}px;top:${startY}px;opacity:0;`;

  if(proj.img){
    const img = document.createElement('img'); img.src=proj.img; img.alt=proj.name; card.appendChild(img);
  } else {
    const ph = document.createElement('div'); ph.className='placeholder'; ph.style.background=proj.colour; card.appendChild(ph);
  }
  const lbl = document.createElement('div'); lbl.className='drift-label'; lbl.textContent=proj.name; card.appendChild(lbl);
  card.addEventListener('click', ()=>{
    window.location.href = proj.slug ? `project.html?project=${proj.slug}` : 'work.html';
  });

  card._speed = DRIFT_SPEED_MIN + Math.random()*(DRIFT_SPEED_MAX-DRIFT_SPEED_MIN);
  card._y     = startY;
  card._col   = colIdx;
  layer.appendChild(card);

  // Fade in after brief delay
  setTimeout(()=>{ card.style.transition='opacity 1.4s ease'; card.style.opacity='1'; }, 60);
  return card;
}

function colLowestBottom(colIdx){
  // Returns the y of the bottom edge of the lowest card in this column.
  // If none, returns 0.
  let lowest = 0;
  document.querySelectorAll('.drift-wrapper').forEach(w => {
    if(w._col === colIdx) lowest = Math.max(lowest, w._y + w.offsetHeight);
  });
  return lowest;
}

const CARD_GAP = 80; // px between stacked cards in same column

function buildDrift(){
  const vh = window.innerHeight;
  const vw = window.innerWidth;
  // Estimate a portrait card height to pre-position the second card
  const colW = Math.floor(vw * 0.44);
  const p = POOL[0];
  const estH = Math.round(p.h * Math.min(p.w, colW) / p.w);

  // Card 1: on screen
  spawnCard(0, Math.floor(vh * 0.05));
  spawnCard(1, Math.floor(vh * 0.45));
  // Card 2: queued just below the first card — no gap when it scrolls up
  spawnCard(0, Math.floor(vh * 0.05) + estH + CARD_GAP);
  spawnCard(1, Math.floor(vh * 0.45) + estH + CARD_GAP);
}

// ── SCROLL VELOCITY → DRIFT BOOST ────────────────────────────
// Scrolling accelerates the drift temporarily; no new cards spawn.
let scrollBoost = 0;
let lastScrollY = window.scrollY;
window.addEventListener('scroll', () => {
  const delta = window.scrollY - lastScrollY; // positive = scrolling down only
  if (delta > 0) scrollBoost = Math.min(scrollBoost + delta * 4, 500);
  lastScrollY = window.scrollY;
});

function startDrift(){
  let lastTime = performance.now();
  (function tick(now){
    const dt = Math.min((now-lastTime)/1000, 0.1);
    lastTime = now;
    const vh = window.innerHeight;
    // Decay boost smoothly back to zero
    scrollBoost *= 0.94;
    document.querySelectorAll('.drift-wrapper').forEach(w=>{
      w._y -= (w._speed + scrollBoost) * dt;
      if(w._y + w.offsetHeight < 0){
        const col = w._col;
        w.remove();
        // Chain new card just below the lowest existing card in this column
        const tail = colLowestBottom(col);
        spawnCard(col, tail + CARD_GAP);
      } else {
        w.style.top = w._y+'px';
      }
    });
    requestAnimationFrame(tick);
  })(performance.now());
}

window.addEventListener('DOMContentLoaded', runAnimation);

// Rebuild drift cards on resize so they fit the new viewport
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const layer = document.getElementById('drift-layer');
    if (!layer || !layer.classList.contains('visible')) return;
    layer.querySelectorAll('.drift-wrapper').forEach(w => w.remove());
    buildDrift();
  }, 200);
});
</script>
</body>
