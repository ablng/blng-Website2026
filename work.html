<style>
  :root { --charcoal:#1C1C1A; --porcelain:#F8F6F3; --terracotta:#D98E6A; --mustard:#FFC850; --green:#7A973F; }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; cursor:none !important; }
  html { scroll-behavior:smooth; }
  body { background:var(--porcelain); color:var(--charcoal); font-family:'DM Sans',sans-serif; font-weight:300; min-height:100vh; display:flex; flex-direction:column; }

  #cursor      { position:fixed; width:10px; height:10px; background:var(--terracotta); border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); transition:transform 0.15s ease; opacity:0; }
  #cursor-ring { position:fixed; width:38px; height:38px; border:2px solid var(--charcoal); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); opacity:0; transition:opacity 0.2s; }

  nav { position:fixed; top:0; left:0; right:0; z-index:100; padding:12px 48px 12px 80px; display:flex; justify-content:space-between; align-items:center; background:var(--porcelain); border-bottom:2px solid rgba(28,28,26,0.07); }
  #nav-logo { display:block; text-decoration:none; opacity:0.9; transition:opacity 0.25s; flex-shrink:0; }
  #nav-logo:hover { opacity:1; }
  #nav-logo img { width:487px; display:block; }
  .nav-links { display:flex; gap:44px; list-style:none; }
  .nav-links a { font-size:1.4rem; letter-spacing:0.12em; text-transform:uppercase; text-decoration:none; color:var(--charcoal); transition:color 0.25s; }
  .nav-links a:hover { color:var(--terracotta); }
  .nav-links a.active { color:var(--green); }

  #hover-panel { position:fixed; left:48px; top:50%; transform:translateY(-50%); z-index:50; pointer-events:none; opacity:0; transition:opacity 0.35s ease; }
  #hover-panel .ph { box-shadow:0 16px 60px rgba(28,28,26,0.15); transition:width 0.25s ease, height 0.25s ease, background 0.4s ease; display:block; }
  #hover-panel img { display:block; max-width:min(800px, calc(50vw - 72px)); max-height:85vh; box-shadow:0 16px 60px rgba(28,28,26,0.15); }

  main { flex:1; padding:200px 48px 80px 80px; }
  .filters { display:flex; gap:10px; margin-bottom:56px; flex-wrap:nowrap; justify-content:flex-end; margin-left:50%; }
  .filter-btn { font-family:'DM Sans',sans-serif; font-size:1.1rem; letter-spacing:0.14em; text-transform:uppercase; padding:10px 24px; border:2px solid rgba(28,28,26,0.25); background:transparent; color:var(--charcoal); transition:all 0.2s; flex-shrink:0; border-radius:999px; }
  .filter-btn:hover { border-color:var(--terracotta); color:var(--terracotta); }
  .filter-btn.active { background:transparent; color:var(--green); border-color:var(--green); }
  .filters { flex-wrap:wrap; }

  .list-area { margin-left:50%; }
  .project-list { border-top:2px solid rgba(28,28,26,0.1); }
  .project-row { display:grid; grid-template-columns:120px 1fr 56px; align-items:center; padding:28px 0; border-bottom:2px solid rgba(28,28,26,0.07); text-decoration:none; color:var(--charcoal); position:relative; }
  .project-row::after { content:''; position:absolute; bottom:-2px; left:0; right:0; height:2px; background:var(--terracotta); transform:scaleX(0); transform-origin:right; transition:transform 0.4s ease; }
  .project-row:hover::after { transform:scaleX(1); }
  .project-row.hidden { display:none; }
  .row-type  { font-size:1.1rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--green); }
  .row-title { font-size:2.0rem; letter-spacing:0.01em; padding:0 32px; transition:color 0.2s; }
  .row-year  { font-size:1.1rem; letter-spacing:0.1em; color:var(--green); text-align:right; }
  .project-row:hover .row-title { color:var(--terracotta); }

  footer { border-top:2px solid rgba(28,28,26,0.1); padding:56px 60px; display:grid; grid-template-columns:1fr 1fr 1fr; align-items:end; flex-shrink:0; margin-top:auto; }
  .footer-address { font-size:1.2rem; line-height:1.9; color:var(--charcoal); letter-spacing:0.04em; }
  .footer-middle  { text-align:center; font-size:1.2rem; line-height:2; letter-spacing:0.04em; color:var(--charcoal); }
  .footer-right   { text-align:right; font-size:1.2rem; line-height:1.9; letter-spacing:0.04em; color:var(--charcoal); }
  footer a { color:var(--charcoal); text-decoration:underline; text-underline-offset:3px; transition:color 0.2s; }
  footer a:hover { color:var(--terracotta); }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 1024px) {
    #nav-logo img { width:401px; }
  }
  @media (max-width: 768px) {
    #nav-logo img { width:298px; }
    nav { padding:10px 20px 10px 24px; }
    .nav-links { gap:24px; }
    .nav-links a { font-size:1.2rem; }
    #hover-panel { display:none; }
    main { padding:140px 24px 60px; }
    .filters { justify-content:flex-start; gap:8px; margin-bottom:36px; margin-left:0; }
    .filter-btn { font-size:1.0rem; padding:8px 16px; }
    .list-area { margin-left:0; }
    .project-row { grid-template-columns:80px 1fr 44px; padding:20px 0; }
    .row-title { font-size:1.6rem; padding:0 16px; }
    .row-type { font-size:0.95rem; }
    footer { grid-template-columns:1fr; gap:20px; padding:40px 24px; }
    .footer-middle { text-align:left; }
    .footer-right { text-align:left; }

    /* ─── MOBILE WORK LIST ─── */
    main.mobile-work { padding-left:0; padding-right:0; }
    main.mobile-work .filters { display:none; }
    main.mobile-work .list-area { margin-left:0; }
    .mp-list { border-top:2px solid rgba(28,28,26,0.1); }
    .mp-item { border-bottom:2px solid rgba(28,28,26,0.07); }
    .mp-name-row { display:flex; justify-content:space-between; align-items:baseline; padding:20px 24px; text-decoration:none; color:var(--charcoal); opacity:0.32; transition:opacity 0.5s ease; }
    .mp-item.is-active .mp-name-row { opacity:1; }
    .mp-name-text { font-size:1.7rem; font-weight:300; letter-spacing:0.01em; line-height:1.25; transition:font-size 0.4s ease; }
    .mp-item.is-active .mp-name-text { font-size:2.1rem; }
    .mp-meta { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; margin-left:16px; }
    .mp-year { font-size:1.0rem; letter-spacing:0.1em; color:var(--green); }
    .mp-type { font-size:0.85rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--green); opacity:0.7; }
    .mp-hero { overflow:hidden; max-height:0; opacity:0; margin-left:0; margin-right:0; transition:max-height 0.65s cubic-bezier(0.4,0,0.2,1), opacity 0.45s ease; }
    .mp-item.is-active .mp-hero { max-height:100vw; opacity:1; }
    .mp-hero a { display:block; }
    .mp-hero img { width:100%; display:block; }
  }
  @media (max-width: 480px) {
    #nav-logo img { width:220px; }
    nav { padding:8px 14px 8px 16px; }
    .nav-links { gap:12px; }
    .nav-links a { font-size:1.0rem; letter-spacing:0; }
    main { padding:106px 16px 48px; }
    .filters { gap:6px; margin-bottom:28px; }
    .filter-btn { font-size:0.9rem; padding:6px 12px; }
    .project-row { grid-template-columns:1fr 40px; padding:16px 0; }
    .row-type { display:none; }
    .row-title { font-size:1.3rem; padding:0; }
    footer { padding:28px 16px; }
  }

  /* ─── MOBILE MENU ─── */
  .menu-btn { display: none; background: none; border: none; padding: 8px; flex-direction: column; gap: 6px; align-items: center; justify-content: center; }
  .menu-btn span { display: block; width: 24px; height: 2px; background: var(--charcoal); }
  .mobile-menu { position: fixed; inset: 0; z-index: 500; display: flex; flex-direction: column; padding: 28px 24px; opacity: 0; pointer-events: none; transition: opacity 0.35s ease; }
  .mobile-menu.open { opacity: 1; pointer-events: all; }
  .mobile-menu-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 72px; }
  .mobile-menu-logo { text-decoration: none; }
  .mobile-menu-logo img { width: 200px; display: block; }
  .mobile-menu-close { background: none; border: none; font-size: 1.4rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--charcoal); font-family: 'DM Sans', sans-serif; padding: 0; }
  .mobile-menu-links { list-style: none; display: flex; flex-direction: column; gap: 32px; }
  .mobile-menu-links a { font-size: 1.4rem; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; color: var(--charcoal); font-family: 'DM Sans', sans-serif; }
  .mobile-menu-links a.active { color: var(--green); }
  @media (max-width: 768px) {
    .nav-links { display: none !important; }
    .menu-btn { display: flex; }
  }
</style>

<script>
(function() {
  'use strict';

  var CLOUD = 'dgelbnw1g';

  // Footer random color
  document.querySelector('footer').style.background =
    ['#FFD67C','#B8CE88','#D98E6A'][Math.floor(Math.random() * 3)];

  // ── CURSOR (pointer devices only) ────────────────────────────
  var isTouch = window.matchMedia('(hover: none)').matches;
  var cursor, ring;
  if (!isTouch) {
    cursor = document.getElementById('cursor');
    ring   = document.getElementById('cursor-ring');
    var mx=0, my=0, rx=0, ry=0;
    document.addEventListener('mousemove', function(e) {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx+'px'; cursor.style.top = my+'px';
      cursor.style.opacity = '1'; ring.style.opacity = '0.4';
    });
    document.addEventListener('mouseleave', function() {
      cursor.style.opacity = '0'; ring.style.opacity = '0';
    });
    (function lerp() {
      rx += (mx-rx)*0.10; ry += (my-ry)*0.10;
      ring.style.left = rx+'px'; ring.style.top = ry+'px';
      requestAnimationFrame(lerp);
    })();
  }

  function setCursorScale(el) {
    if (isTouch) return;
    el.addEventListener('mouseenter', function() {
      cursor.style.transform = 'translate(-50%,-50%) scale(2.2)';
      ring.style.transform   = 'translate(-50%,-50%) scale(1.3)';
      ring.style.opacity     = '0.75';
    });
    el.addEventListener('mouseleave', function() {
      cursor.style.transform = 'translate(-50%,-50%) scale(1)';
      ring.style.transform   = 'translate(-50%,-50%) scale(1)';
      ring.style.opacity     = '0.4';
    });
  }
  document.querySelectorAll('a, button').forEach(setCursorScale);

  // ── HOVER PANEL ──────────────────────────────────────────────
  var panel    = document.getElementById('hover-panel');
  var ph       = document.getElementById('panel-ph');
  var panelImg = null;
  var hideTimer = null;

  function attachHover(row) {
    row.addEventListener('mouseenter', function() {
      clearTimeout(hideTimer);
      var folder = row.dataset.folder;
      var maxH = Math.round(window.innerHeight * 0.85);
      var maxW = Math.min(800, Math.round(window.innerWidth * 0.5) - 72);

      if (folder) {
        // Load hero image from Cloudinary
        var url = 'https://res.cloudinary.com/' + CLOUD +
                  '/image/upload/f_auto,q_auto,w_800/' + folder + '-01';
        ph.style.display = 'none';
        if (!panelImg) {
          panelImg = document.createElement('img');
          panelImg.style.cssText = 'display:block;max-width:'+maxW+'px;max-height:'+maxH+'px;box-shadow:0 16px 60px rgba(28,28,26,0.15);';
          panel.appendChild(panelImg);
        }
        panelImg.src = url;
        panelImg.style.display = 'block';
      } else {
        if (panelImg) panelImg.style.display = 'none';
        ph.style.display = 'block';
        ph.style.width   = '300px';
        ph.style.height  = '400px';
        ph.style.background = 'linear-gradient(135deg,#c4b8a8,#9a8878)';
      }
      panel.style.opacity = '1';
    });
    row.addEventListener('mouseleave', function() {
      hideTimer = setTimeout(function() { panel.style.opacity = '0'; }, 120);
    });
    setCursorScale(row);
  }

  // ── LOAD & RENDER PROJECTS ───────────────────────────────────
  var allProjects = [];
  var activeFilter = 'all';

  function renderRows() {
    var list = document.getElementById('project-list');
    list.innerHTML = '';
    allProjects.forEach(function(p) {
      var typeLabel = p.type[0] || '';
      var typesLower = p.type.map(function(t){ return t.toLowerCase(); });
      var row = document.createElement('a');
      row.className = 'project-row';
      row.href = 'project.html?project=' + encodeURIComponent(p.slug);
      row.dataset.types  = p.type.join(',').toLowerCase();
      row.dataset.folder = p.folder;
      row.innerHTML =
        '<span class="row-type">'  + escHtml(typeLabel)  + '</span>' +
        '<span class="row-title">' + escHtml(p.title)    + '</span>' +
        '<span class="row-year">'  + escHtml(p.year)     + '</span>';

      // Apply current filter
      if (activeFilter !== 'all' && typesLower.indexOf(activeFilter) === -1) {
        row.classList.add('hidden');
      }

      list.appendChild(row);
      attachHover(row);
    });
  }

  function buildFilters(projects) {
    var typeSet = {};
    projects.forEach(function(p) {
      p.type.forEach(function(t) { typeSet[t] = true; });
    });
    var types = Object.keys(typeSet).sort();
    var bar = document.getElementById('filter-bar');
    bar.innerHTML = '';

    var allBtn = document.createElement('button');
    allBtn.className = 'filter-btn active';
    allBtn.dataset.filter = 'all';
    allBtn.textContent = 'All';
    bar.appendChild(allBtn);

    types.forEach(function(t) {
      var btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.filter = t.toLowerCase();
      btn.textContent = t;
      bar.appendChild(btn);
    });

    bar.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        bar.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        panel.style.opacity = '0';
        document.querySelectorAll('.project-row').forEach(function(row) {
          var types = row.dataset.types ? row.dataset.types.split(',') : [];
          row.classList.toggle('hidden', activeFilter !== 'all' && types.indexOf(activeFilter) === -1);
        });
      });
      setCursorScale(btn);
    });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── MOBILE: SCROLLING FOCUS LIST ────────────────────────────
  function renderMobile(projects) {
    var mainEl = document.querySelector('main');
    mainEl.classList.add('mobile-work');

    var list = document.getElementById('project-list');
    list.className = 'mp-list';
    list.innerHTML = '';

    var activeIndex = -1;

    projects.forEach(function(p, i) {
      var heroUrl = 'https://res.cloudinary.com/' + CLOUD +
                    '/image/upload/f_auto,q_auto,w_900/' + p.folder + '-01';
      var typeLabel = (p.type && p.type[0]) ? p.type[0] : '';

      var item = document.createElement('div');
      item.className = 'mp-item';
      item.dataset.index = i;
      item.innerHTML =
        '<a class="mp-name-row" href="project.html?project=' + encodeURIComponent(p.slug) + '">' +
          '<span class="mp-name-text">' + escHtml(p.title) + '</span>' +
          '<span class="mp-meta">' +
            '<span class="mp-year">' + escHtml(p.year) + '</span>' +
            (typeLabel ? '<span class="mp-type">' + escHtml(typeLabel) + '</span>' : '') +
          '</span>' +
        '</a>' +
        '<div class="mp-hero">' +
          '<a href="project.html?project=' + encodeURIComponent(p.slug) + '">' +
            '<img src="' + escHtml(heroUrl) + '" alt="' + escHtml(p.title + (p.location ? ', ' + p.location : '') + ' — blng studio') + '" loading="lazy">' +
          '</a>' +
        '</div>';

      list.appendChild(item);
    });

    var items = list.querySelectorAll('.mp-item');

    function setActive(index) {
      if (index === activeIndex) return;
      activeIndex = index;
      items.forEach(function(el, i) {
        el.classList.toggle('is-active', i === index);
      });
    }

    // Activate first project immediately
    setActive(0);

    // Scroll-based activation: find the last item whose top has crossed 35% from top
    // This fires for exactly one item at a time regardless of scroll speed
    function updateActive() {
      var threshold = window.innerHeight * 0.35;
      var best = 0;
      items.forEach(function(item, i) {
        var top = item.getBoundingClientRect().top;
        if (top <= threshold) best = i;
      });
      setActive(best);
    }
    window.addEventListener('scroll', updateActive, { passive: true });
    updateActive();
  }

  fetch('projects.json')
    .then(function(r){ return r.json(); })
    .then(function(projects) {
      allProjects = projects;
      if (window.innerWidth <= 768) {
        renderMobile(projects);
      } else {
        buildFilters(projects);
        renderRows();
      }
    })
    .catch(function(){ /* show nothing on error */ });

})();
</script>

(function(){
  var btn   = document.getElementById('menu-btn');
  var menu  = document.getElementById('mobile-menu');
  var close = document.getElementById('menu-close');
  var colors = ['#FFD67C','#B8CE88','#D98E6A'];
  function openMenu()  { menu.style.background = colors[Math.floor(Math.random()*colors.length)]; menu.classList.add('open'); document.body.style.overflow='hidden'; }
  function closeMenu() { menu.classList.remove('open'); document.body.style.overflow=''; }
  if (btn)   btn.addEventListener('click', openMenu);
  if (close) close.addEventListener('click', closeMenu);
})();
</script>
